<!DOCTYPE html>
<html>
<head>
    <title>S R K Restaurant</title>

    <style>
        * {
            margin: 1;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        .header {
            background-image: url(https://images.pexels.com/photos/3201921/pexels-photo-3201921.jpeg?cs=srgb&dl=pexels-quark-studio-1159039-3201921.jpg&fm=jpg);
            text-align: center;
            padding: 30px 10px;
        }

        .header h1 {
            color: rgb(167, 180, 179);
            font-size: 36px;
        }

        .header p {
            color: rgb(100, 118, 126);
            font-size: 16px;
        }

        .menu-title {
            text-align: center;
            font-size: 24px;
            margin: 20px 0;
            text-decoration: underline,;
        }

        .menu-container {
            width: 90%;
            max-width: 900px;
            margin: auto;
        }

        .menu-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 2px solid #66ff7d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .menu-left {
            display: flex;
            align-items: center;
        }

        .menu-left img {
            width: 100px;
            height: 120px;
            border-radius: 6px;
            object-fit: cover;
        }

        .menu-text {
            margin-left: 20px;
            font-size: 16px;
        }

        .price {
            font-weight: bold;
            font-size: 20px;
            color: aliceblue;
        }
    </style>
</head>

<body>
   <style> body {
    background-color: rgb(0, 87, 128);
}</style>

    <div class="header">
        <h1>S R K Restaurant</h1>
        <p>Please Yourself with Our Meals</p>
    </div>


    <h2 class="menu-title">Menu</h2>

    <div class="menu-container">

        <div class="menu-item">
            <div class="menu-left">
                <img src="https://www.madhuseverydayindian.com/wp-content/uploads/2022/11/easy-vegetable-biryani.jpg" alt="Veg Biryani">
                <div class="menu-text">
                    <p style="color: aliceblue;"> Veg Biryani is not a Biryani.It's a Pulao</p>
                </div>
            </div>
            <div class="price">₹1200</div>
        </div>

        <div class="menu-item">
            <div class="menu-left">
                <img src="https://images.archanaskitchen.com/images/recipes/indian/main-course/north-indian-vegetarian-recipes/sabzi-recipes/Matar_Butter_Masala_Recipe_Peas_Masala_1_44008ee291.jpg" alt="Mattar Masala">
                <div class="menu-text">
                   <p style="color: aliceblue;"> Mattar masala is a delicious side dish</p>
                </div>
            </div>
            <div class="price">₹180</div>
        </div>

        <div class="menu-item">
            <div class="menu-left">
                <img src="https://i2.wp.com/vegecravings.com/wp-content/uploads/2017/03/veg-hakka-noodles-recipe-with-step-by-step-instructions.jpg?w=1612&quality=65&strip=all&ssl=1" alt="Veg Soft Noodles">
                <div class="menu-text">
                    <p style="color: aliceblue;">Veg Soft Noodles is a delicious chinese dish</p>
                </div>
            </div>
            <div class="price">₹200</div>
        </div>

    </div>

</body>
</html>
